# problem with GCC 14 in vendored xnnpack
c_compiler_version:     # [aarch64]
  - 13                  # [aarch64]
  - 13                  # [aarch64]
cxx_compiler_version:   # [aarch64]
  - 13                  # [aarch64]
  - 13                  # [aarch64]

MACOSX_SDK_VERSION:         # [osx]
  - 14.5                    # [osx]

channel_targets:
  - conda-forge main
  - conda-forge pytorch_rc
is_rc:
  - False
  - True
zip_keys:
  -
    - channel_targets
    - is_rc

blas_impl:
  - mkl                         # [x86_64]
  # deprioritized on windows, would be nice to have
  - generic                     # [unix]

github_actions_labels:
- self-hosted@cirun-openstack-cpu-xlarge    # [linux64]
- self-hosted@cirun-openstack-gpu-2xlarge   # [linux64]
- default                                   # [linux and aarch64]
- ghcr.io/cirruslabs/macos-runner:tahoe-xl  # [osx and arm64]
- self-hosted@cirun-azure-windows-4xlarge   # [win]
