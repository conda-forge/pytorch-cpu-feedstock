# problem with GCC 14 in vendored xnnpack
c_compiler_version:     # [aarch64]
  - 13                  # [aarch64]
  - 13                  # [aarch64]
cxx_compiler_version:   # [aarch64]
  - 13                  # [aarch64]
  - 13                  # [aarch64]

MACOSX_SDK_VERSION:         # [osx]
  - 14.5                    # [osx]

channel_targets:
  - conda-forge main
  - conda-forge pytorch_rc
is_rc:
  - False
  - True
zip_keys:
  -
    - channel_targets
    - is_rc

blas_impl:
  - mkl                         # [x86_64]
  # deprioritized on windows, would be nice to have
  - generic                     # [unix]

# https://github.com/conda-forge/.cirun
github_actions_labels:
- namespace-profile-16cpu-on-linux-64       # [linux and x86_64]
- namespace-profile-16cpu-on-linux-aarch64  # [linux and aarch64]
- namespace-profile-12cpu-on-osx-arm64      # [osx]
- namespace-profile-16cpu-on-win-64         # [win]
