# if you wish to build release candidate number X, append the version string with "-rcX"
{% set version = "2.12.1" %}
{% set build = 0 %}

# Use a higher build number for the CUDA variant, to ensure that it's
# preferred by conda's solver, and it's preferentially
# installed where the platform supports it.
{% if cuda_compiler_version != "None" %}
{% set build = build + 200 %}
{% endif %}

{% if blas_impl == "mkl" %}
{% set build = build + 100 %}
{% endif %}

# see https://github.com/pytorch/pytorch/blame/v{{ version }}/.ci/docker/ci_commit_pins/triton.txt
# pytorch and triton are released in tandem, see notes in their release process
# https://github.com/pytorch/pytorch/blob/main/RELEASE.md#triton-dependency-for-the-release
{% set triton = "3.7.1" %}

package:
  name: libtorch
  version: {{ version.replace("-", ".") }}

source:
{% if "rc" in version %}
  - url: https://download.pytorch.org/source_code/test/pytorch-v{{ version }}.tar.gz
    sha256: 3035931fff5b79e0300db69b0249e0c9c7ea5b394f451cb80e0280cbc2affcc2
{% else %}
  # The "pytorch-v" tarballs contain submodules; the "pytorch-" ones don't.
  - url: https://github.com/pytorch/pytorch/releases/download/v{{ version }}/pytorch-v{{ version }}.tar.gz
    sha256: 757145cfd55c7c8c01f58c959f76230641cc67fdd1d8b6a130f93ad1bc116f5f
{% endif %}
    patches:
      - patches/0001-Force-usage-of-python-3-and-error-without-numpy.patch
      # conda-specific: make setup.py honor $CMAKE_ARGS so conda's cross-compilation
      # toolchain reaches cmake before project(). Upstream PR #177640 moved env-var
      # forwarding into cmake/EnvVarForwarding.cmake (include()d after project()),
      # which is too late for the setup.py build path; honoring CMAKE_ARGS (as
      # scikit-build-core/conda-forge do) puts it on the command line in time.
      - patches/0002-Honor-CMAKE_ARGS-in-setup.py-cmake-invocation.patch
      # conda-specific patch, lets us override CUDA paths
      - patches/0003-Allow-overriding-CUDA-related-paths.patch
      # fix BLAS calling convention for openblas
      - patches/0004-Use-BLAS_USE_CBLAS_DOT-for-OpenBLAS-builds.patch
      - patches/0005-Fix-FindOpenBLAS.patch
      # point to headers that are now living in $PREFIX/include instead of $SP_DIR/torch/include
      - patches/0006-use-our-own-PREFIX-for-include-paths-etc.patch
      - patches/0007-make-ATEN_INCLUDE_DIR-relative-to-TORCH_INSTALL_PREF.patch
      - patches/0008-remove-DESTINATION-lib-from-CMake-install-TARGETS-di.patch         # [win]
      - patches/0009-avoid-deprecated-find_package-CUDA-in-caffe2-CMake-m.patch
      # skip a test that fails with numpy v2.3; still triggers as of pytorch v2.9
      - patches/0010-skip-test_norm_matrix_degenerate_shapes-on-numpy-2.3.patch
      # backport https://github.com/pytorch/pytorch/pull/127702
      - patches/0011-Define-PY_SSIZE_T_CLEAN-before-include-Python.h.patch
      # backport https://github.com/pytorch/pytorch/pull/166824
      - patches/0012-Add-USE_SYSTEM-options-for-KLEIDI-CUDNN_FRONTEND-CUT.patch
      - patches/0013-Fix-building-kineto-against-system-fmt.patch
      - patches/0014-Use-Intel-LLVM-openmp.patch
      - patches/0015-for-win-CUDA-remove-USE_CUDA-guard-for-skip-in-compi.patch         # [cuda_compiler_version != "None"]
      # backport https://github.com/pytorch/pytorch/pull/180388
      - patches/0016-Fix-build-with-MAGMA-2.10.0-180388.patch
      - patches/0017-Declare-_tryToInferTypeImpl-with-TORCH_PYTHON_API.patch
      # fix a test-isolation leak in test_incorrect_abstract_impl that globally
      # disables autograd dispatch and causes hundreds of spurious
      # "element 0 of tensors does not require grad" failures
      # backport https://github.com/pytorch/pytorch/pull/186550
      - patches/0018-Fix-dispatch-key-guard-leak-in-test_incorrect_abstra.patch
      # escape backslashes/quotes when CMAKE_CXX_FLAGS etc. are baked into
      # macros.h build strings, so the Windows (MSVC) build of caffe2/core/common.cc
      # doesn't choke on backslash paths -> C4129/C2065 'EHsc'
      - patches/0019-Escape-backslashes-quotes-in-macros.h-build-strings-.patch
      # support the cuDSS 0.8 API (new cudssDataType_t enum + offsetType arg in
      # cudssMatrixCreateCsr) so we can build against libcudss >=0.8; upstreamable
      - patches/0020-Update-cuDSS-matrix-create-calls-for-cuDSS-0.8-API.patch
      # Handlers.cpp uses std::unordered_map / std::vector without including them;
      # fails to compile on osx-arm64 metal builds (from AnacondaRecipes)
      - patches/0021-Add-missing-includes-in-c10d-control_plane-Handlers..patch
      # pytest 9 removed the deprecated `path` argument of pytest_pycollect_makemodule
      # (from AnacondaRecipes); this lets us test with pytest 9.0
      - patches/0022-Remove-deprecated-path-parameter-from-pytest_pycolle.patch
      # pytest-xdist cannot serialize torch builtin function objects in
      # unittest subTest metadata
      - patches/0023-Use-serializable-subtest-labels-in-autograd-test.patch
      - patches_submodules/tensorpipe/0001-switch-away-from-find_package-CUDA.patch

build:
  number: {{ build }}
  # This logic allows two rc variants to be defined in the conda_build_config, but only one to actually be built.
  # We want to be able to define two variants in the cbc so we can assign different labels to each in the upload channel
  # (by zipping is_rc with channel_targets). This prevents rc builds being used unless specifically requested.
{% if "rc" in version %}
  skip: true  # [not is_rc]
{% else %}
  skip: true  # [is_rc]
{% endif %}
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_{{ blas_impl }}_h{{ PKG_HASH }}_{{ build }}  # [cuda_compiler_version != "None"]
  string: cpu_{{ blas_impl }}_h{{ PKG_HASH }}_{{ build }}                                                 # [cuda_compiler_version == "None"]
  detect_binary_files_with_prefix: false
  missing_dso_whitelist:
    - '*/libcuda.so.*'    # [linux]
    - '*/nvcuda.dll'      # [win]
  run_exports:
    - {{ pin_subpackage('libtorch', max_pin='x.x') }}
  ignore_run_exports_from:
    - python *
    - numpy *
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  ignore_run_exports:
    - python *
    - numpy *
    - libmagma_sparse

requirements:
  # Keep this list synchronized (except for python*, numpy*) in outputs
  # We use python to build libtorch as well because it is easier
  build:
    # When you change 3.12 here, change it in build.sh/bld.bat as well
    - python 3.12                            # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy  *                               # [build_platform != target_platform]
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}                 # [cuda_compiler_version != "None"]
    - arm-variant * {{ arm_variant_type }}   # [linux and aarch64 and cuda_compiler_version != "None"]
    - libuv                     # [win]
    - llvm-openmp
    - cmake
    - ninja
    # Keep libprotobuf here so that a compatibile version
    # of protobuf is installed between build and host
    - libprotobuf
    - protobuf
    - make      # [linux]
    - sccache   # [win]
    - grep      # [unix]
    - rsync     # [unix]
  host:
    # GPU requirements
    {% if cuda_compiler_version != "None" %}
    - cuda-cudart-dev
    - cuda-cupti-dev
    - cuda-driver-dev       # [linux]
    - cuda-nvml-dev
    - cuda-nvrtc-dev
    - cuda-nvtx-dev
    - cuda-profiler-api
    - cuda-version {{ cuda_compiler_version }}
    - cusparselt
    - libcublas-dev
    - libcudnn-dev
    - libcudss-dev
    - libcufile-dev         # [linux]
    - libcufft-dev
    - libcurand-dev
    - libcusolver-dev
    - libcusparse-dev
    - libmagma-devel
    - nccl                  # [linux]
    - nccl <2.29            # [linux and cuda_compiler_version=="12.9" and arm_variant_type!="tegra"]
    - nvtx-c
    {% endif %}
    # other requirements
    - python 3.12
    - numpy *
    - pip
    - setuptools <82
    - pyyaml
    - requests
    - six
    - mkl-devel             # [blas_impl == "mkl"]
    - libcblas * *_mkl      # [blas_impl == "mkl"]
    - libblas               # [blas_impl != "mkl"]
    - libcblas              # [blas_impl != "mkl"]
    - liblapack             # [blas_impl != "mkl"]
    - onednn                # [not win]
    - libabseil
    - libprotobuf
    - llvm-openmp
    - sleef
    - libuv
    - pkg-config  # [unix]
    - typing_extensions
    - pybind11
    - pybind11-abi
    - eigen
    - zlib
    - fmt
    - packaging
  run:
    - libblas * *{{ blas_impl }}        # [blas_impl == "mkl"]
  run_constrained:
    # https://github.com/conda-forge/pytorch-cpu-feedstock/issues/65
    - pytorch-cpu {{ version }}    # [cuda_compiler_version == "None"]
    - pytorch-gpu <0.0a0           # [cuda_compiler_version == "None"]
    - pytorch-gpu {{ version }}    # [cuda_compiler_version != "None"]
    - pytorch-cpu <0.0a0           # [cuda_compiler_version != "None"]
    - pytorch {{ version }} cuda{{ cuda_compiler_version | replace('.', '') }}_{{ blas_impl }}_*_{{ build }}  # [cuda_compiler_version != "None"]
    - pytorch {{ version }} cpu_{{ blas_impl }}_*_{{ build }}                                                 # [cuda_compiler_version == "None"]
    # if using OpenBLAS, ensure that a version compatible with OpenMP is used
    # otherwise, we get the following warnings:
    # OpenBLAS Warning : Detect OpenMP Loop and this application may hang. Please rebuild the library with USE_OPENMP=1 option.
    - libopenblas * openmp_*       # [unix and blas_impl != "mkl"]
    - openblas * openmp_*          # [unix and blas_impl != "mkl"]

# these tests are for the libtorch output below, but due to
# a particularity of conda-build, that output is defined in
# the global build stage, including tests
test:
  requires:
    # cmake needs a compiler to run package detection, see
    # https://discourse.cmake.org/t/questions-about-find-package-cli-msvc/6194
    - {{ compiler('cxx') }}
    # for CMake config to find cuda & nvrtc
    - {{ compiler('cuda') }}    # [cuda_compiler_version != "None"]
    - cuda-nvrtc-dev            # [cuda_compiler_version != "None"]
    - nvtx-c                    # [cuda_compiler_version != "None"]
    - cmake
    - ninja
    - pkg-config
  files:
    - cmake_test/
  commands:
    # libraries; peculiar formatting to avoid linter false positives about selectors
    {% set torch_libs = [
        "c10", "shm", "torch", "torch_cpu", "torch_global_deps"
    ] + (cuda_compiler_version != "None" and target_platform.startswith("linux")) * [
        "torch_cuda_linalg"
    ] + (cuda_compiler_version != "None") * [
        "c10_cuda", "caffe2_nvrtc", "torch_cuda"
    ]
    %}
    {% for each_lib in torch_libs %}
    - test -f $PREFIX/lib/lib{{ each_lib }}.so              # [linux]
    - test -f $PREFIX/lib/lib{{ each_lib }}.dylib           # [osx]
    - if not exist %LIBRARY_BIN%\{{ each_lib }}.dll exit 1  # [win]
    {% if each_lib != "torch_global_deps" %}
    - if not exist %LIBRARY_LIB%\{{ each_lib }}.lib exit 1  # [win]
    {% endif %}
    {% endfor %}

    # CMake files in share
    - test -f $PREFIX/share/cmake/Torch/TorchConfig.cmake                       # [linux]
    - if not exist %LIBRARY_PREFIX%\share\cmake\Torch\TorchConfig.cmake exit 1  # [win]

    # test integrity of CMake metadata
    - cd cmake_test
    - cmake -GNinja -DCMAKE_CXX_STANDARD=17 $CMAKE_ARGS .   # [unix]
    - cmake -GNinja -DCMAKE_CXX_STANDARD=17 %CMAKE_ARGS% .  # [win]

outputs:
  - name: libtorch
  - name: pytorch
    script: build.sh    # [unix]
    script: bld.bat     # [win]
    build:
      string: cuda{{ cuda_compiler_version | replace('.', '') }}_{{ blas_impl }}_py{{ CONDA_PY }}_h{{ PKG_HASH }}_{{ build }}  # [cuda_compiler_version != "None"]
      string: cpu_{{ blas_impl }}_py{{ CONDA_PY }}_h{{ PKG_HASH }}_{{ build }}                                                 # [cuda_compiler_version == "None"]
      detect_binary_files_with_prefix: false
      run_exports:
        - {{ pin_subpackage('pytorch', max_pin='x.x') }}
        - {{ pin_subpackage('libtorch', max_pin='x.x') }}
      ignore_run_exports:
        - libmagma_sparse
    requirements:
      build:
        - python
        - cross-python_{{ target_platform }}     # [build_platform != target_platform]
        - numpy                                  # [build_platform != target_platform]
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('cuda') }}                 # [cuda_compiler_version != "None"]
        - arm-variant * {{ arm_variant_type }}   # [linux and aarch64 and cuda_compiler_version != "None"]
        - cmake
        - ninja
        # Keep libprotobuf here so that a compatibile version
        # of protobuf is installed between build and host
        - libprotobuf
        - protobuf
        - make      # [linux]
        - sccache   # [win]
      host:
        - {{ pin_subpackage('libtorch', exact=True) }}
        # GPU requirements
        {% if cuda_compiler_version != "None" %}
        - cuda-cudart-dev
        - cuda-cupti-dev
        - cuda-driver-dev       # [linux]
        - cuda-nvml-dev
        - cuda-nvrtc-dev
        - cuda-nvtx-dev
        - cuda-profiler-api
        - cuda-version {{ cuda_compiler_version }}
        - cusparselt
        - libcublas-dev
        - libcudnn-dev
        - libcudss-dev
        - libcufile-dev         # [linux]
        - libcufft-dev
        - libcurand-dev
        - libcusolver-dev
        - libcusparse-dev
        - libmagma-devel
        - nccl                  # [linux]
        - nccl <2.29            # [linux and cuda_compiler_version=="12.9" and arm_variant_type!="tegra"]
        - nvtx-c
        {% endif %}
        # other requirements
        - python
        - numpy
        - pip
        - setuptools <82
        - pyyaml
        - requests
        - six
        - mkl-devel             # [blas_impl == "mkl"]
        - libcblas * *_mkl      # [blas_impl == "mkl"]
        - libcblas              # [blas_impl != "mkl"]
        - liblapack             # [blas_impl != "mkl"]
        - onednn                # [not win]
        - libabseil
        - libprotobuf
        - llvm-openmp
        - pybind11
        - pybind11-abi
        - eigen
        - sleef
        - libuv
        - pkg-config  # [unix]
        - typing_extensions
        - zlib
        - fmt
        - packaging
      run:
        - {{ pin_subpackage('libtorch', exact=True) }}
        - llvm-openmp
        - libblas * *{{ blas_impl }}        # [blas_impl == "mkl"]
        - nomkl                             # [blas_impl != "mkl"]
        - triton =={{ triton }}             # [cuda_compiler_version != "None" and not win]
        # avoid that people without GPUs needlessly download ~0.5-1GB
        - __cuda                            # [cuda_compiler_version != "None"]
        - python
        # other requirements, see https://github.com/pytorch/pytorch/blame/main/requirements.txt
        - filelock
        - fsspec
        - jinja2
        - networkx
        - optree >=0.13.0
        - pybind11
        - setuptools <82
        - sympy >=1.13.3
        - typing_extensions >=4.10.0
      run_constrained:
        # https://github.com/conda-forge/pytorch-cpu-feedstock/issues/65
        - pytorch-cpu {{ version }}    # [cuda_compiler_version == "None"]
        - pytorch-gpu <0.0a0           # [cuda_compiler_version == "None"]
        - pytorch-gpu {{ version }}    # [cuda_compiler_version != "None"]
        - pytorch-cpu <0.0a0           # [cuda_compiler_version != "None"]
    test:
      imports:
        - torch
        - torch._C

  - name: pytorch-tests
    build:
      string: cuda{{ cuda_compiler_version | replace('.', '') }}_{{ blas_impl }}_py{{ CONDA_PY }}_h{{ PKG_HASH }}_{{ build }}  # [cuda_compiler_version != "None"]
      string: cpu_{{ blas_impl }}_py{{ CONDA_PY }}_h{{ PKG_HASH }}_{{ build }}                                                 # [cuda_compiler_version == "None"]
      detect_binary_files_with_prefix: false
    requirements:
      host:
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
        - python
      run:
        - pytorch {{ version }} cuda*_{{ blas_impl }}_py{{ CONDA_PY }}*{{ build }}   # [cuda_compiler_version != "None"]
        - pytorch {{ version }} cpu_{{ blas_impl }}_py{{ CONDA_PY }}*{{ build }}     # [cuda_compiler_version == "None"]
    test:
      requires:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        # for torch.compile tests
        - {{ compiler('cuda') }}       # [cuda_compiler_version != "None"]
        - ninja
        - boto3
        - hypothesis
        # pytest 9.0 compatibility of test/conftest.py is fixed by patch 0023
        # (PytestRemovedIn9Warning, see
        # https://github.com/conda-forge/pytorch-cpu-feedstock/pull/448#issuecomment-3529016115)
        - pytest <9.1
        - tabulate
        - pydot
        - pip
        - expecttest
        - xmlrunner
        - pyyaml
        # Required by run_test.py
        - pytest-flakefinder
        - pytest-rerunfailures
        - pytest-xdist
        # danpetry/TF: Pytorch includes their own edited version of pytest-shard and adding
        # it into the test deps as well results in the --shard-id option being added twice.
        # https://github.com/pytorch/pytorch/blob/main/test/pytest_shard_custom.py
        # - pytest-shard
        # for cmake_test
        - cmake
        - cuda-nvrtc-dev            # [cuda_compiler_version != "None"]
        - nvtx-c                    # [cuda_compiler_version != "None"]
        # not required upstream, but useful
        - pytest-timeout
      files:
        - cmake_test/
      source_files:
        # Only include the source_files if we are actually going to run the tests.
        - test
        - tools
      commands:
        # Run pip check so as to ensure that all pytorch packages are installed
        # https://github.com/conda-forge/pytorch-cpu-feedstock/issues/24
        - pip check
        - python -c "import torch; print(torch.__version__)"
        - python -c "import torch; assert torch.backends.mkldnn.m.is_available()"  # [x86 and cuda_compiler_version == "None"]
        - python -c "import torch; torch.tensor(1).to('cpu').numpy(); print('numpy support enabled!!!')"
        # We have had issues with openmp .dylibs being doubly loaded in certain cases. These two tests catch the (observed) issue
        - python -c "import torch; import numpy"
        - python -c "import numpy; import torch"
        - python -c "import numpy as np;import torch;x = torch.tensor([2], dtype=torch.complex128);res = torch.dot(x, x); assert res.real == 4.0, res"
        # distributed support is enabled by default on linux; for mac, we enable it manually in build.sh
        - python -c "import torch; assert torch.distributed.is_available()"         # [linux or osx]
        - python -c "import torch; assert torch.backends.mps.is_available()"        # [osx]
        - python -c "import torch; assert torch.backends.cuda.is_built()"           # [cuda_compiler_version != "None"]
        - python -c "import torch; assert torch.backends.cudnn.is_available()"      # [cuda_compiler_version != "None"]
        - python -c "import torch; assert torch.backends.cudnn.enabled"             # [cuda_compiler_version != "None"]
        - python -c "import torch; assert torch.version.cuda is not None"           # [cuda_compiler_version != "None"]

        # python-version-specific library (default location in SP_DIR symlinks back to this)
        - test -f $PREFIX/lib/libtorch_python${SHLIB_EXT}           # [unix]
        - if not exist %LIBRARY_BIN%\torch_python.dll exit 1        # [win]
        - if not exist %SP_DIR%\torch\lib\torch_python.lib exit 1   # [win]
        - if not exist %SP_DIR%\torch\lib\_C.lib exit 1             # [win]

        # the whole test suite takes forever, but we should get a good enough coverage
        # for potential packaging problems by running a fixed subset
        {% set tests = " ".join([
            "test/test_autograd.py",
            "test/test_autograd_fallback.py",
            "test/test_custom_ops.py",
            "test/test_linalg.py",
            "test/test_mkldnn.py",
            "test/test_modules.py",
            "test/test_nn.py",
            "test/test_torch.py",
            "test/test_xnnpack_integration.py",
        ]) %}
        # tests torch.compile; avoid on aarch because it adds >4h in test runtime in emulation;
        # they add a lot of runtime (15->60min on windows), so run them for only one python version
        {% set tests = tests ~ " test/inductor/test_torchinductor.py" %}    # [py==312 and not (aarch64 or osx)]

        {% set skips = "(TestTorch and test_print)" %}
        # downloads a legacy module from download.pytorch.org; fails on network/SSL flakes
        {% set skips = skips ~ " or (TestNN and test_module_backcompat)" %}
        # minor tolerance violations
        {% set skips = skips ~ " or test_1_sized_with_0_strided_cpu_float32" %}         # [osx]
        {% set skips = skips ~ " or test_batchnorm_nhwc_cpu" %}                         # [unix]
        {% set skips = skips ~ " or test_layer_norm_backwards_eps" %}                   # [unix]
        # onednn errors ("unsupported {isa, datatype, datatype combination, sparse md configuration}")
        {% set skips = skips ~ " or test__int4_mm_m" %}                                 # [aarch64]
        {% set skips = skips ~ " or test_lstm_cpu" %}                                   # [aarch64]
        {% set skips = skips ~ " or test_remove_no_ops_cpu" %}                          # [aarch64]
        {% set skips = skips ~ " or test_weight_norm_bwd_cpu" %}                        # [aarch64]
        # ... for float16
        {% set skips = skips ~ " or (_cpu_float16 and (dummy_for_consistency_below"%}   # [aarch64]
            {% set skips = skips ~ " or test_activations_bfloat16_half_cpu" %}          # [aarch64]
            {% set skips = skips ~ " or test_addbmm" %}                                 # [aarch64]
            {% set skips = skips ~ " or test_addmm" %}                                  # [aarch64]
            {% set skips = skips ~ " or test_addmv" %}                                  # [aarch64]
            {% set skips = skips ~ " or test_baddbmm" %}                                # [aarch64]
            {% set skips = skips ~ " or test_bmm" %}                                    # [aarch64]
            {% set skips = skips ~ " or test_conv_deconv" %}                            # [aarch64]
            {% set skips = skips ~ " or test_conv_nhwc_lower_precision" %}              # [aarch64]
            {% set skips = skips ~ " or test_conv_transpose_nhwc_lower_precision" %}    # [aarch64]
            {% set skips = skips ~ " or test_dot_vs_numpy" %}                           # [aarch64]
            {% set skips = skips ~ " or test_grouped_mm_cpu_unaligned" %}               # [aarch64]
            {% set skips = skips ~ " or test_linear_lowp" %}                            # [aarch64]
            {% set skips = skips ~ " or test_matmul_lower_precision" %}                 # [aarch64]
        # ... for complex32
        {% set skips = skips ~ ")) or (_cpu_complex32 and (dummy_for_consistency_below"%}  # [aarch64]
            {% set skips = skips ~ " or test_forward_nn_ConvTranspose" %}               # [aarch64]
            {% set skips = skips ~ " or test_if_train_and_eval_modes_differ_nn_ConvTr" %}  # [aarch64]
            {% set skips = skips ~ " or test_memory_format_nn_ConvTranspose1d" %}       # [aarch64]
            {% set skips = skips ~ " or test_non_contiguous_tensors_nn_ConvTranspo" %}  # [aarch64]
            {% set skips = skips ~ " or test_save_load_nn_ConvTranspose" %}             # [aarch64]
        {% set skips = skips ~ "))"%}                                                   # [aarch64]
        # timeouts and failures on aarch, see https://github.com/conda-forge/pytorch-cpu-feedstock/pull/298#issuecomment-2555888508
        {% set skips = skips ~ " or test_pynode_destruction_deadlock" %}                # [aarch64]
        {% set skips = skips ~ " or (TestLinalgCPU and test_cholesky_cpu_float32)" %}   # [aarch64]
        {% set skips = skips ~ " or (TestLinalgCPU and test_pca_lowrank_cpu)" %}        # [aarch64]
        {% set skips = skips ~ " or (TestLinalgCPU and test_svd_lowrank_cpu)" %}        # [aarch64]
        {% set skips = skips ~ " or (TestMkldnnCPU and test_lstm_cpu)" %}               # [aarch64]
        # very long-running tests in emulation
        {% set skips = skips ~ " or test_eigh_lwork_lapack" %}                          # [aarch64]
        {% set skips = skips ~ " or test_gradgrad_nn_LSTM" %}                           # [aarch64]
        {% set skips = skips ~ " or test_grad_nn_Transformer" %}                        # [aarch64]
        {% set skips = skips ~ " or test_inverse_errors_large" %}                       # [aarch64]
        {% set skips = skips ~ " or (TestXNNPACKConv1dTransformPass and test_conv1d_basic)" %}  # [aarch64]
        # gross cholesky reconstruction error on aarch64 (openblas/QEMU), like test_cholesky_cpu_float32 above
        {% set skips = skips ~ " or (TestLinalgCPU and test_cholesky_upper_reconstructs_cpu_float32)" %}  # [aarch64]
        # debug=True checkpoint path raises ValueError: stoi from C++ traceback symbolization on aarch64
        {% set skips = skips ~ " or (TestAutograd and test_checkpoint_detects_non_determinism)" %}  # [aarch64]
        # doesn't crash, but gets different result on aarch + CUDA
        {% set skips = skips ~ " or illcondition_matrix_input_should_not_crash_cpu" %}  # [aarch64 and cuda_compiler_version != "None"]
        # may crash spuriously
        {% set skips = skips ~ " or (TestAutograd and test_profiler_seq_nr)" %}         # [not win]
        {% set skips = skips ~ " or (TestAutograd and test_profiler_propagation)" %}    # [not win]
        # tests that fail due to resource clean-up issues (non-unique temporary libraries), see
        # https://github.com/conda-forge/pytorch-cpu-feedstock/pull/318#issuecomment-2620080859
        {% set skips = skips ~ " or test_mutable_custom_op_fixed_layout" %}             # [not win]
        # minor inaccuracy on aarch64 (emulation?)
        {% set skips = skips ~ " or (TestNN and test_upsampling_bfloat16)" %}           # [aarch64]
        {% set skips = skips ~ " or (TestLinalgCPU and test_qr_cpu_float32)" %}         # [aarch64]
        # flaky failure: `Exec format error: '$PREFIX/bin/python3.12'`
        {% set skips = skips ~ " or test_terminate_handler_on_crash" %}                 # [aarch64]
        # may crash spuriously
        {% set skips = skips ~ " or (TestAutograd and test_profiler_seq_nr)" %}
        {% set skips = skips ~ " or (TestAutograd and test_profiler_propagation)" %}
        # tests that fail due to resource clean-up issues (non-unique temporary libraries), see
        # https://github.com/conda-forge/pytorch-cpu-feedstock/pull/318#issuecomment-2620080859
        {% set skips = skips ~ " or test_mutable_custom_op_fixed_layout" %}
        # trivial accuracy problems
        {% set skips = skips ~ " or test_BCELoss_weights_no_reduce_cuda" %}             # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_ctc_loss_cudnn_tensor_cuda" %}                 # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or (TestTorch and test_index_add_correctness)" %}      # [linux and cuda_compiler_version != "None"]
        # These tests require higher-resource or more recent GPUs than the CI provides
        {% set skips = skips ~ " or test_sdpa_inference_mode_aot_compile" %}            # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or (TestNN and test_grid_sample)" %}                   # [linux and cuda_compiler_version != "None"]
        # don't mess with tests that rely on GPU failure handling
        {% set skips = skips ~ " or test_cublas_config_nondeterministic_alert_cuda" %}  # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_cross_entropy_loss_2d_out_of_bounds_class" %}  # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_indirect_device_assert" %}                     # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_reentrant_parent_error_on_cpu_cuda" %}         # [linux and cuda_compiler_version != "None"]
        # test that fails to find temporary resource
        {% set skips = skips ~ " or (GPUTests and test_scatter_reduce2)" %}             # [linux and cuda_compiler_version != "None"]
        # ROCM test whose skip doesn't trigger
        {% set skips = skips ~ " or test_ck_blas_library_cpu" %}                        # [linux and cuda_compiler_version != "None"]
        # problem with finding output of `torch.cuda.tunable.write_file()`
        {% set skips = skips ~ " or test_matmul_offline_tunableop_cuda_float16" %}      # [linux and cuda_compiler_version != "None"]
        # catastropic accuracy failure in convolution
        {% set skips = skips ~ " or test_Conv3d_1x1x1_no_bias_cuda" %}                  # [linux and cuda_compiler_version != "None"]
        # some triton errors that appeared in #391
        {% set skips = skips ~ " or test_isinf_cuda" %}                                 # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_donated_buffer_inplace_gpt" %}                 # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_linear_dynamic_maxautotune_cuda" %}            # [linux and cuda_compiler_version != "None"]
        # skip some very long-running groups of tests (~30 minutes total)
        {% set skips = skips ~ " or (test_gradgrad_nn_Transformer and _cuda_)" %}       # [linux and cuda_compiler_version != "None"]
        {% set skips = skips ~ " or test_avg_pool3d_backward2" %}                       # [linux and cuda_compiler_version != "None"]
        # MKL problems
        {% set skips = skips ~ " or (TestLinalgCPU and test_inverse_errors_large_cpu)" %}   # [linux and blas_impl == "mkl" and cuda_compiler_version != "None"]
        # non-MKL problems
        {% set skips = skips ~ " or test_gather_scatter_cpu or test_index_put2_cpu" %}      # [linux and blas_impl != "mkl" and cuda_compiler_version != "None"]
        # these tests are failing with low -n values
        {% set skips = skips ~ " or test_base_does_not_require_grad_mode_nothing" %}    # [not win]
        {% set skips = skips ~ " or test_base_does_not_require_grad_mode_warn" %}       # [not win]
        {% set skips = skips ~ " or test_composite_registered_to_cpu_mode_nothing" %}   # [not win]
        # these tests are failing on windows
        {% set skips = skips ~ " or (TestMkldnnCPU and test_batch_norm_2d_cpu)" %}       # [win]
        # flaky test, fragile to GC behavior
        {% set skips = skips ~ " or (TestTorch and test_tensor_cycle_via_slots)" %}
        # unexpected success
        {% set skips = skips ~ " or test_forward_nn_Bilinear_mps_float16" %}            # [osx and arm64]
        # "quantized engine NoQEngine is not supported"
        {% set skips = skips ~ " or test_qengine" %}                                    # [osx and arm64]
        # flaky failure on osx
        {% set skips = skips ~ " or test_LayerNorm_numeric_mps" %}                      # [osx and arm64]
        # precision errors
        {% set skips = skips ~ " or test_forward_nn_Linear" %}                          # [osx and arm64]
        {% set skips = skips ~ " or test_forward_nn_TransformerEncoderLayer_train_mode_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_GRUCell_mps" %}      # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_GRU_eval_mode_mps" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_GRU_train_mode_mps" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_LSTMCell_mps" %}     # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_Linear_mps" %}       # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_MultiheadAttention_eval_mode_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_MultiheadAttention_train_mode_mps_float16" %}  # [osx and arm64]
        # MPS float16 precision deltas on newer Apple Silicon (not seen on current CI runners,
        # skipped tactically for robustness across macOS/hardware versions)
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_TransformerDecoderLayer_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_TransformerEncoder_eval_mode_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_TransformerEncoder_train_mode_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_TransformerEncoderLayer_train_mode_mps_float16" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_RNNCell_mps" %}      # [osx and arm64]
        # MPS MultiheadAttention non-contiguous float32 precision deltas on osx-arm64 CI
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_MultiheadAttention_train_mode_mps_float32" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_MultiheadAttention_eval_mode_mps_float32" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_RNN_eval_mode_mps" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_RNN_train_mode_mps" %}  # [osx and arm64]
        {% set skips = skips ~ " or test_transformerencoderlayer_mps_float32" %}        # [osx and arm64]
        {% set skips = skips ~ " or test_transformerencoderlayer_gelu_mps_float32" %}   # [osx and arm64]
        {% set skips = skips ~ " or test_grad_nn_MultiheadAttention_eval_mode_cpu_float64" %}   # [osx and arm64]
        {% set skips = skips ~ " or test_non_contiguous_tensors_nn_CrossEntropyLoss_mps_float32" %}   # [osx and arm64]
        # some warning-related failure, maybe it's broken by --disable-warnings?
        {% set skips = skips ~ " or test_cpp_warnings_have_python_context_cpu" %}
        {% set skips = skips ~ " or test_cpp_warnings_have_python_context_cuda" %}
        # "Attempt to trace generator"
        {% set skips = skips ~ " or test_lite_regional_compile_flex_attention_cuda" %}
        # Regressions in 2.11.0
        {% set skips = skips ~ " or test_compile_dyn_quant_matmul_4bit" %}               # [win and cuda_compiler_version == "13.0"]
        {% set skips = skips ~ " or test__int8_mm_m" %}                                  # [win and cuda_compiler_version == "13.0"]
        {% set skips = skips ~ " or test_pdist_cuda_gradgrad_unimplemented" %}           # [win and cuda_compiler_version == "13.0"]
        {% set skips = skips ~ " or test_inverse_errors_large_cpu" %}                    # [win and cuda_compiler_version == "13.0"]
        {% set skips = skips ~ " or test_torchinductor" %}                               # [win and cuda_compiler_version == "13.0"]
        {% set skips = skips ~ " or test_eigh_svd_illcondition_matrix_input_should_not_crash_cpu_float32" %}  # [aarch64]

        - export OMP_NUM_THREADS=4      # [unix]
        - export ONEDNN_VERBOSE=all     # [unix]
        - set ONEDNN_VERBOSE=all        # [win]
        # reduced paralellism to avoid OOM for CUDA builds
        {% set jobs = "-n 2" %}
        {% set jobs = "-n 1" %}     # [linux64 and cuda_compiler_version != "None"]
        # test only one python version on aarch because emulation is super-slow;
        # disable hypothesis because it randomly yields health check errors
        - pytest {{ jobs }} {{ tests }} -k "not ({{ skips }})" -m "not hypothesis" --durations=50 --timeout=1200 --disable-warnings --force-short-summary   # [not aarch64 or py==312]

        # regression test for https://github.com/conda-forge/pytorch-cpu-feedstock/issues/329, where we picked up
        # duplicate `.pyc` files due to newest py-ver (3.14) in the build environment not matching the one in host;
        # obviously this test can only be done for other python versions.
        - test ! -f $SP_DIR/functorch/__pycache__/__init__.cpython-314.pyc          # [py!=314 and unix]
        - if exist %SP_DIR%\functorch\__pycache__\__init__.cpython-314.pyc exit 1   # [py!=314 and win]

        # test integrity of CMake metadata and ensure that THPLayoutType is visible as a symbol from libtorch_python
        - cd cmake_test
        - mkdir build build2
        - cd build
        - cmake -GNinja -DCMAKE_CXX_STANDARD=17 -DWITH_TORCH_PYTHON=ON $CMAKE_ARGS ..   # [unix]
        - cmake -GNinja -DCMAKE_CXX_STANDARD=17 -DWITH_TORCH_PYTHON=ON %CMAKE_ARGS% ..  # [win]
        - cmake --build .                   # [unix]
        - cmake --build . --config Release  # [win]
        - cd ../build2
        # regression test for https://github.com/conda-forge/pytorch-cpu-feedstock/issues/479
        - cmake -GNinja -DCMAKE_CXX_STANDARD=17 -DWITH_TORCH_PYTHON=ON -DTorch_DIR=$SP_DIR/torch/share/cmake/Torch $CMAKE_ARGS ..    # [unix]
        - cmake -GNinja -DCMAKE_CXX_STANDARD=17 -DWITH_TORCH_PYTHON=ON -DTorch_DIR=%SP_DIR%/torch/share/cmake/Torch %CMAKE_ARGS% ..  # [win]
        - cmake --build .                   # [unix]
        - cmake --build . --config Release  # [win]

  - name: pytorch-cpu   # [cuda_compiler_version == "None"]
  - name: pytorch-gpu   # [cuda_compiler_version != "None"]
    build:
      string: cuda{{ cuda_compiler_version | replace('.', '') }}_{{ blas_impl }}_h{{ PKG_HASH }}_{{ build }}    # [cuda_compiler_version != "None"]
      string: cpu_{{ blas_impl }}_h{{ PKG_HASH }}_{{ build }}                                                   # [cuda_compiler_version == "None"]
      detect_binary_files_with_prefix: false
    requirements:
      host:
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      run:
        - pytorch {{ version }} cuda*_{{ blas_impl }}*{{ build }}   # [cuda_compiler_version != "None"]
        - pytorch {{ version }} cpu_{{ blas_impl }}*{{ build }}     # [cuda_compiler_version == "None"]
    test:
      imports:
        - torch

about:
  home: https://pytorch.org/
  dev_url: https://github.com/pytorch/pytorch
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
    - NOTICE
    - third_party/CMake/Copyright.txt
  summary: PyTorch is an optimized tensor library for deep learning using GPUs and CPUs.
  description: |
    PyTorch is a Python package that provides two high-level features:
      - Tensor computation (like NumPy) with strong GPU acceleration
      - Deep neural networks built on a tape-based autograd system
    You can reuse your favorite Python packages such as NumPy, SciPy, and Cython to extend PyTorch when needed.
  doc_url: https://pytorch.org/docs/

